<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link href="../../styles/signup.css" rel="stylesheet">
</head>

<body>
    <main class="main">
        <section class="header">
            <div class="brandMark">
                <img class="chatLogo"
                    src="https://res.cloudinary.com/doan4g4r9/image/upload/v1758112824/white_on_black-removebg-preview_iiul19.png"
                    alt="Me Chat">
                <span>Me Chat</span>
            </div>
        </section>

        <section class="signupSection">
            <div class="signupBox">
                <div class="signupIntro">
                    <p>Start chatting</p>
                    <h1>Sign up</h1>
                </div>

                <button type="button" class="oauthBox googleBox">
                    <img class="oauthImage googleImage"
                        src="https://res.cloudinary.com/doan4g4r9/image/upload/v1760085309/48131_ess0xo.png"
                        alt="">
                    <p>Google</p>
                </button>
                <button type="button" class="oauthBox facebookBox">
                    <img class="oauthImage faceImage"
                        src="https://res.cloudinary.com/doan4g4r9/image/upload/v1760086148/185-1854464_facebook-logo-png-transparent-background-removebg-preview_1_uwiru7.png"
                        alt="">
                    <p>Facebook</p>
                </button>
                <button type="button" class="oauthBox instagramBox">
                    <img class="oauthImage instaImage"
                        src="https://res.cloudinary.com/doan4g4r9/image/upload/v1760085257/logo-instagram-116587966427mvdfvahmo-removebg-preview_n9he3l.png"
                        alt="">
                    <p>Instagram</p>
                </button>
            </div>
        </section>

        <section class="loginHeader">
            <button type="button" class="loginDir">Already have an account? <span>Login</span></button>
        </section>
    </main>
    <script type="module" src="./signup.js"></script>
</body>

</html>
